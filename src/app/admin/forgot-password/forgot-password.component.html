<div [ngClass]="!isHidden ? 'hidden' : ''" class="forgotPassword">
  <h1>Quên mật khẩu?</h1>
  <p>Hãy điền email gắn với tài khoản để lấy đường dẫn lấy lại mật khẩu!!</p>
  <form
    nz-form
    [nzLayout]="'inline'"
    [formGroup]="validateForm"
    (ngSubmit)="submitForm()"
  >
    <nz-form-item>
      <nz-form-control nzErrorTip="Mời nhập email để lấy lại mật khẩu">
        <nz-input-group nzPrefixIcon="email">
          <input
            formControlName="emailForgotPassword"
            nz-input
            placeholder="Nhập email ở đây"
          />
        </nz-input-group>
      </nz-form-control>
    </nz-form-item>
    <div class="messageDiv">
      <p>{{ messageError == "" ? "" : messageError }}</p>
    </div>
    <nz-form-item>
      <nz-form-control>
        <button nz-button nzType="primary" [disabled]="!validateForm.valid">
          Lấy mật khẩu
        </button>
      </nz-form-control>
    </nz-form-item>
    <nz-form-item>
      <nz-form-control class="Login">
        <a routerLink="/Login">Trở lại trang đăng nhập</a>
      </nz-form-control>
    </nz-form-item>
  </form>
</div>
<div [ngClass]="isHidden ? 'hidden' : ''">
  <h1>Gửi đường dẫn thành công</h1>
  <p>Vui lòng truy cập email để lấy đường dẫn để thay đổi mật khẩu</p>
</div>
