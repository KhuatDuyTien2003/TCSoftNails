<form [formGroup]="productGroupForm" (ngSubmit)="onSubmit()">
  <div class="flex w-[700px]">
    <div class="bg-white rounded-lg shadow-lg w-full">
      <!-- Header Dialog -->
      <div class="bg-gray-200">
        <div class="p-4 flex justify-between items-center">
          <h2 class="text-lg font-semibold">Thêm Sản phẩm trong nhóm Hàng</h2>
          <button
            type="button"
            (click)="onCancel()"
            class="pr-2 text-gray-500 hover:text-red-700"
          >
            <i class="fas fa-times"></i>
          </button>
        </div>
      </div>
      <!-- Nội dung Dialog -->
      <div class="p-4">
        <!-- Nhóm hàng -->
        <div class="flex items-center justify-between">
          <label class="w-[20%] block text-gray-700">
            Nhóm sản phẩm
            <i class="fas fa-info-circle text-gray-400"></i>
          </label>
          <div class="w-[80%] mr-5 flex items-center">
            <select
              formControlName="productTypeId"
              class="w-full border rounded p-2 mt-1 h-10"
            >
              <option disabled value="">--Chọn nhóm sản phẩm--</option>
              <option
                *ngFor="let option of productGroup"
                [value]="option.productTypeId"
              >
                {{ option.productTypeName }}
              </option>
            </select>
          </div>
        </div>

        <div class="m-4 flex justify-end space-x-2">
          <button
            type="submit"
            class="bg-green-500 text-white px-4 py-2 rounded"
          >
            Thêm
          </button>
          <button
            type="button"
            (click)="onCancel()"
            class="bg-gray-500 text-white px-4 py-2 rounded"
          >
            Bỏ qua
          </button>
        </div>
      </div>
    </div>
  </div>
</form>
